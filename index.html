<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pip!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bootScreen">
        <div class="bootTerminal">
            <p>> CODENAME: PIP</p>
            <p>> SYSTEM STATUS: ONLINE</p>
            <button id="bootBtn">LAUNCH SYSTEM</button>
        </div>
    </div>
    <div id="container">
        <div >
            <div class="menuContainer">
                <label >Companion: </label>
                <select id="petSelect">
                    <option value="bear">Bear</option>
                    <option value="bunny">Bunny</option>
                    <option value="cat">Cat</option>
                    <option value="chick">Chick</option>
                    <option value="dog">Dog</option>
                    <option value="dragon">Dragon</option>
                    <option value="fox">Fox</option>
                    <option value="frog">Frog</option>
                    <option value="panda">Panda</option>
                    <option value="penguin">Penguin</option>
                    <option value="slime">Slime</option>
                </select>
            </div>
        </div>
        <main class="arcadeScreen">
                <div class="pet idle"></div>
                <div id="gameOverOverlay" class="hidden">
                    <p id="gameOverText">you MADE a MISTAKE: PIP is GONE</p>
                    <button id="rebootBtn">Reboot?</button>
                </div>
        </main>
            <div id="stats">
                <div id="hunger" class="health">
                    <div id="hungerStatus" class="status"></div>
                    <progress max="100" value="10" id="hungerBar" class="progressBar"></progress>
                    <button id="feedBtn">Feed</button>
                </div>
                <div id="energy" class="health">
                    <div id="energyStatus" class="status"></div>
                    <progress max="100" value="10" id="energyBar" class="progressBar"></progress>
                    <button id="sleepBtn">Sleep</button>
                </div>
                <div id="happiness" class="health">
                    <div id="happinessStatus" class="status"></div>
                    <progress max="100" value="10" id="happinessBar" class="progressBar"></progress>
                    <button id="playBtn">Play!</button>
                </div>
            </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
